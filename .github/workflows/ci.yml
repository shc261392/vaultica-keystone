name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  lint:
    name: Lint (Biome & Markdownlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - uses: actions/setup-node@v4
        with:
          node-version: "24.13.1"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Run linting
        run: pnpm lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - uses: actions/setup-node@v4
        with:
          node-version: "24.13.1"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm typecheck

  validate:
    name: Validate Tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - uses: actions/setup-node@v4
        with:
          node-version: "24.13.1"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate token structure
        run: pnpm validate

      - name: Check JSON syntax
        run: |
          for file in tokens/*.json; do
            echo "Validating $file..."
            node -e "JSON.parse(require('fs').readFileSync('$file', 'utf8'))"
          done

      - name: Check required files
        run: |
          REQUIRED_FILES=(
            "tokens/colors.json"
            "tokens/typography.json"
            "tokens/effects.json"
            "tokens/spacing.json"
            "tokens/semantic.json"
            "ai/brand-context.md"
            "ai/personality.md"
          )

          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing required file: $file"
              exit 1
            fi
            echo "✓ Found $file"
          done

  truth-check:
    name: Truth Docs Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - uses: actions/setup-node@v4
        with:
          node-version: "24.13.1"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check truth documents
        run: pnpm check:truth

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - uses: actions/setup-node@v4
        with:
          node-version: "24.13.1"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: pnpm audit --audit-level=moderate

  build:
    name: Build Design Tokens
    runs-on: ubuntu-latest
    needs: [lint, typecheck, validate, truth-check]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - uses: actions/setup-node@v4
        with:
          node-version: "24.13.1"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tokens
        run: pnpm build

      - name: Upload build artifacts
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: vaultica-tokens
          path: dist/
          retention-days: 30

  preview-quality:
    name: Preview App Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - uses: actions/setup-node@v4
        with:
          node-version: "24.13.1"
          cache: "pnpm"
          cache-dependency-path: "preview/pnpm-lock.yaml"

      - name: Install preview dependencies
        run: pnpm --dir preview install --frozen-lockfile

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: TypeScript type check
        run: cd preview && pnpm type-check

      - name: Lint with Biome
        run: cd preview && pnpm lint

  preview-build:
    name: Preview App Build
    runs-on: ubuntu-latest
    needs: preview-quality
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - uses: actions/setup-node@v4
        with:
          node-version: "24.13.1"
          cache: "pnpm"
          cache-dependency-path: "preview/pnpm-lock.yaml"

      - name: Install preview dependencies
        run: pnpm --dir preview install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: |
            preview/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('preview/pnpm-lock.yaml') }}-${{ hashFiles('preview/src/**/*') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('preview/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Build preview app
        run: pnpm preview:build
        env:
          NODE_ENV: production

      - name: Check build output
        run: |
          if [ ! -d "preview/.next" ]; then
            echo "❌ Build failed: .next directory not found"
            exit 1
          fi
          echo "✅ Preview app built successfully"

  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint, typecheck, validate, truth-check, security-audit, build, preview-build]
    if: always()
    steps:
      - name: Check if all jobs succeeded
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.validate.result }}" != "success" ]] || \
             [[ "${{ needs.truth-check.result }}" != "success" ]] || \
             [[ "${{ needs.security-audit.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.preview-build.result }}" != "success" ]]; then
            echo "❌ Some checks failed"
            exit 1
          fi
          echo "✅ All checks passed!"
